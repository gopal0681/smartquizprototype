<h2>Preview Extracted Questions</h2>

{% for q in questions %}

<div style="border:1px solid #ccc;padding:10px;margin:10px">

<b>{{q.question}}</b>

<ul>
<li>A {{q.a}}</li>
<li>B {{q.b}}</li>
<li>C {{q.c}}</li>
<li>D {{q.d}}</li>
</ul>

Answer: {{q.correct}}

</div>

{% endfor %}

<form method="POST" action="/save-questions/">

{% csrf_token %}

<button type="submit">Confirm & Save</button>

</form>
